data:
  source: data/market/vix/vix_15m.csv
  vix_files:
    5: data/market/vix/vix_5m.csv
    10: data/market/vix/vix_10m.csv
    15: data/market/vix/vix_15m.csv
    30: data/market/vix/vix_30m.csv
  rv_source: data/market/spx/spx_5m.csv
  spx_files:
    5: data/market/spx/spx_5m.csv
    30: data/market/spx/spx_30m.csv
  spx_daily: data/market/spx/spx_daily_2010_latest.csv
  vvix_source: data/market/vvix/vvix_daily.csv
  sofr_source: data/rates/sofr_daily_nyfed.csv
  data_type: vix
  segment_length: 120
  stride_ratio: 0.5
  rv_window: 78
  rv_bar_interval_min: 5
  max_gap_hours: 4
  max_overnight_jump: 0.5
  trading_hours_per_day: 6.5
  options_cache_dir: data/options_cache
  multi_scale:
    enabled: false
    scales:
    - freq_min: 15
      segment_length: 120
      weight: 1.0
    - freq_min: 30
      segment_length: 240
      weight: 0.5
    - freq_min: 60
      segment_length: 120
      weight: 0.3
training:
  n_epochs: 100
  batch_size: 256
  learning_rate_init: 0.001
  learning_rate_final: 1.0e-05
  decay_steps: 500
  gradient_clip: 1.0
  lambda_mean: 10.0
  warmup_steps: 50
  validation_split: 0.15
  early_stopping_patience: 50
  mean_penalty_mode: global
  mean_penalty_space: log_v
  training_mode: general
  q_measure:
    lambda_martingale: 5.0
    lambda_smile: 1.0
    lambda_mmd_regularizer: 0.1
    lambda_jump_reg: 0.1
    options_data_source: data/options_cache
neural_sde:
  backbone: ou
  sig_truncation_order: 3
  mlp_width: 64
  mlp_depth: 3
  drift_scale: 0.5
  diffusion_min: 0.1
  diffusion_max: 1.6
  learn_ou_params: true
  kappa: 2.72
  theta: -3.5
  log_v_clip_min: -7.0
  log_v_clip_max: 2.0
  jumps:
    lambda_init: 2.0
    mu_j_init: 0.5
    sigma_j_init: 0.3
    prior_target: 3.0
  fractional:
    hurst_init: 0.005
    eta_init: 1.341
    learn_hurst: true
    learn_eta: true
simulation:
  n_steps: 120
  T: 0.01832
  n_paths: 5000
  bars_per_day: 26
  bar_interval_min: 15
  coherence_test:
    enabled: true
    horizons_days:
    - 5
    - 10
    - 20
    - 30
    tolerance_mean: 0.15
    tolerance_std: 0.3
bergomi:
  hurst: 0.005
  eta: 1.341
  eta_source: config
  rho: -0.959
  xi0: 0.029241
  fBm_method: volterra
pricing:
  strike: 100.0
  barrier: 90.0
  spot: 100.0
  risk_free_rate: 0.05
  maturity: 0.01832
  n_mc_paths: 5000
  use_sofr: true
backtesting:
  n_days: 30
  n_mc_paths: 10000
  rv_source: data/trading_view/equity_indices/spx_30m.csv
  maturity_days: 30
  moneyness_range:
  - -0.15
  - 0.15
  n_strikes: 11
risk:
  confidence_levels:
  - 0.95
  - 0.99
  var_horizon_days: 1
  stressed_var_multiplier: 1.5
  n_mc_paths: 50000
  stress_scenarios:
    black_monday:
      spot_shock: -0.22
      vol_shock: 1.5
    lehman:
      spot_shock: -0.08
      vol_shock: 0.8
    covid:
      spot_shock: -0.12
      vol_shock: 2.0
    flash_crash:
      spot_shock: -0.09
      vol_shock: 0.5
    volmageddon:
      spot_shock: -0.04
      vol_shock: 1.0
hedging:
  transaction_cost_bps: 2.0
  default_hedge_freq: daily
  rebalance_threshold_delta: 0.01
regime:
  signals:
    vix_level:
      weight: 0.3
      thresholds:
        calm: 13
        normal: 20
        stressed: 30
    vvix:
      weight: 0.2
      thresholds:
        calm: 80
        normal: 100
        stressed: 130
    term_structure:
      weight: 0.2
    vrp:
      weight: 0.15
    vix_percentile:
      weight: 0.15
  regime_params:
    calm:
      H: 0.1
      eta: 1.5
      rho: -0.65
    normal:
      H: 0.07
      eta: 1.9
      rho: -0.7
    stressed:
      H: 0.06
      eta: 2.5
      rho: -0.8
    crisis:
      H: 0.03
      eta: 3.5
      rho: -0.9
exotics:
  asian:
    averaging: arithmetic
  autocallable:
    coupon_rate: 0.08
    autocall_barrier: 1.0
    ki_barrier: 0.6
  cliquet:
    local_cap: 0.05
    local_floor: -0.03
    global_floor: 0.0
api:
  host: 0.0.0.0
  port: 8000
  workers: 1
outputs:
  dir: outputs
  model_dir: outputs/models
  plots_dir: outputs/plots
  backtest: outputs/backtest_results.json
  calibration: outputs/advanced_calibration.json
