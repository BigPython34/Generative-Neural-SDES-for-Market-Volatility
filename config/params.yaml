data:
  source: data/market/volatility/vix_15m.csv
  vix_files:
    5: data/market/volatility/vix_5m.csv
    10: data/market/volatility/vix_10m.csv
    15: data/market/volatility/vix_15m.csv
    30: data/market/volatility/vix_30m.csv
  rv_source: data/market/equity_indices/spx_5m.csv
  spx_files:
    5: data/market/equity_indices/spx_5m.csv
    15: data/market/equity_indices/spx_15m.csv
    30: data/market/equity_indices/spx_30m.csv
    daily: data/market/equity_indices/spx_daily.csv
  cac40_files:
    5: data/market/equity_indices/cac40_5m.csv
    15: data/market/equity_indices/cac40_15m.csv
    30: data/market/equity_indices/cac40_30m.csv
  spx_daily: null
  vvix_source: data/market/volatility/vvix_daily.csv
  sofr_source: data/market/rates/sofr_daily_nyfed.csv
  options_cache_dir: data/options_cache
  data_type: vix
  segment_length: 120
  stride_ratio: 0.5
  max_gap_hours: 4
  trading_hours_per_day: 6.5
  trading_days_per_year: 252
  rv_bar_interval_min: 5
  rv_training_window_bars: 4
  daily_min_year: 2000
  daily_rv_window: 5
  rv_filter:
    min: 0.001
    max: 5.0
  rv_window: 78
  max_overnight_jump: 0.5
  hurst_estimation:
    tsrv_frequencies:
    - 5s
    daily_window_days: 5
    daily_min_year: 1990
    min_bars_per_day:
      5s: 200
      5m: 20
      15m: 10
      30m: 6
      1h: 4
      daily: 1
  hurst_assets:
    spx:
      base_dir: data/market/equity_indices
      pattern: spx_{freq}.csv
      frequencies:
      - 5s
      - 5m
      - 15m
      - 30m
      - 1h
      - daily
  multi_scale:
    enabled: false
    scales:
    - freq_min: 15
      segment_length: 120
      weight: 1.0
    - freq_min: 30
      segment_length: 240
      weight: 0.5
    - freq_min: 60
      segment_length: 120
      weight: 0.3
training:
  n_epochs: 100
  batch_size: 256
  learning_rate_init: 0.001
  learning_rate_final: 1.0e-05
  decay_steps: 500
  gradient_clip: 1.0
  lambda_mean: 10.0
  warmup_steps: 50
  validation_split: 0.15
  early_stopping_patience: 50
  mean_penalty_mode: global
  mean_penalty_space: log_v
  training_mode: general
  q_measure:
    lambda_martingale: 5.0
    lambda_smile: 1.0
    lambda_mmd_regularizer: 0.1
    lambda_jump_reg: 0.1
    options_data_source: data/options_cache
neural_sde:
  backbone: fractional
  sig_truncation_order: 4
  mlp_width: 64
  mlp_depth: 3
  drift_scale: 0.5
  diffusion_min: 0.1
  diffusion_max: 1.6
  learn_ou_params: true
  kappa: 2.72
  theta: -3.5
  log_v_clip_min: -7.0
  log_v_clip_max: 2.0
  jumps:
    lambda_init: 10.0
    mu_j_init: 1.0
    sigma_j_init: 0.5
    prior_target: 3.0
  fractional:
    hurst_init: 0.0775
    eta_init: 2.245
    learn_hurst: true
    learn_eta: true
simulation:
  n_steps: 120
  T: 0.01832
  n_paths: 5000
  bars_per_day: 26
  bar_interval_min: 15
  coherence_test:
    enabled: true
    horizons_days:
    - 5
    - 10
    - 20
    - 30
    tolerance_mean: 0.15
    tolerance_std: 0.3
calibration:
  as_of_date: "2026-03-26"
  moneyness_range: [-0.30, 0.30]
  moneyness_basis: forward
  moneyness_tenor_widen_alpha: 0.35
  dividend_yield: 0.0
  min_dte: 14
  max_dte: 365
  max_strikes_per_maturity: 15
  include_itm: false
  joint:
    eta_grid:
    - 1.0
    - 1.3
    - 1.6
    - 2.0
    - 2.4
    - 2.8
    - 3.2
    rho_grid:
    - -0.98
    - -0.95
    - -0.9
    - -0.85
    - -0.8
    - -0.7
    - -0.6
    eta_grid_quick:
    - 1.0
    - 1.5
    - 2.0
    - 2.5
    rho_grid_quick:
    - -0.95
    - -0.85
    - -0.7
    lambda_spx: 1.0
    lambda_vix: 1.0
    lambda_mart: 5.0
    spx_target_rmse: 0.005
    vix_target_rmse: 0.03
    mart_target_rmse: 0.005
    n_mc_paths: 10000
    nelder_mead:
      maxiter: 80
      xatol: 0.002
      fatol: 1.0e-06
    xi0_correction_iters: 4
    final_path_multiplier: 2
  pdv:
    include_itm: true
    max_strikes_per_maturity: 25
    min_vix_tenor_days: 7
    vix_targets:
      mode: merged
      merge_min_sep_days: 5
      futures_min_dte: 7
      futures_max_dte: 365
    n_mc_paths: 200000
    n_mc_paths_final: 400000
    n_steps_per_year: 365
    antithetic: true
    history_days: 1500
    w_smile: 1.0
    w_vix: 1.0
    w_vix_smooth: 0.3
    w_martingale: 5.0
    smile_loss_mode: iv
    min_option_price: 0.75
    max_spread_pct: 0.45
    max_rel_error_clip: 2.0
    grid:
      beta_0: [0.02, 0.03, 0.04]
      beta_1: [-0.10, -0.07, -0.04]
      beta_2: [0.70, 0.85, 1.00]
    nelder_mead:
      maxiter: 500
      xatol: 0.0005
      fatol: 1.0e-07
    optimizer:
      global_method: sobol
      local_method: lbfgsb
      n_global_samples: 96
      top_k: 8
      n_restarts: 3
      coarse_n_paths: 25000
      refine_n_paths: 100000
      final_n_paths: 400000
      use_crn: true
      crn_seed: 42
      crn_n_seeds: 1
      parallel_global_evals: true
      parallel_workers: 0
    vix_nn:
      width: 32
      depth: 2
      n_train_samples: 200000
      n_mc_train: 2048
      n_steps_train: 450
      lr: 0.001
      epochs: 200
      batch_size: 4096
bergomi:
  hurst: 0.0775
  eta: 2.245
  eta_source: config
  rho: -0.903
  xi0: 0.072006
  fBm_method: volterra
pricing:
  strike: 100.0
  barrier: 90.0
  spot: 100.0
  risk_free_rate: 0.05
  maturity: 0.01832
  n_mc_paths: 5000
  use_sofr: true
backtesting:
  n_days: 30
  n_mc_paths: 10000
  rv_source: data/market/equity_indices/spx_30m.csv
  maturity_days: 30
  moneyness_range:
  - -0.15
  - 0.15
  n_strikes: 11
risk:
  confidence_levels:
  - 0.95
  - 0.99
  var_horizon_days: 1
  stressed_var_multiplier: 1.5
  n_mc_paths: 50000
  stress_scenarios:
    black_monday:
      spot_shock: -0.22
      vol_shock: 1.5
    lehman:
      spot_shock: -0.08
      vol_shock: 0.8
    covid:
      spot_shock: -0.12
      vol_shock: 2.0
    flash_crash:
      spot_shock: -0.09
      vol_shock: 0.5
    volmageddon:
      spot_shock: -0.04
      vol_shock: 1.0
hedging:
  transaction_cost_bps: 2.0
  default_hedge_freq: daily
  rebalance_threshold_delta: 0.01
regime:
  signals:
    vix_level:
      weight: 0.3
      thresholds:
        calm: 13
        normal: 20
        stressed: 30
    vvix:
      weight: 0.2
      thresholds:
        calm: 80
        normal: 100
        stressed: 130
    term_structure:
      weight: 0.2
    vrp:
      weight: 0.15
    vix_percentile:
      weight: 0.15
  regime_params:
    calm:
      H: 0.1
      eta: 1.5
      rho: -0.65
    normal:
      H: 0.07
      eta: 1.9
      rho: -0.7
    stressed:
      H: 0.06
      eta: 2.5
      rho: -0.8
    crisis:
      H: 0.03
      eta: 3.5
      rho: -0.9
exotics:
  asian:
    averaging: arithmetic
  autocallable:
    coupon_rate: 0.08
    autocall_barrier: 1.0
    ki_barrier: 0.6
  cliquet:
    local_cap: 0.05
    local_floor: -0.03
    global_floor: 0.0
api:
  host: 0.0.0.0
  port: 8000
  workers: 1
outputs:
  dir: outputs
  model_dir: outputs/models
  plots_dir: outputs/plots
  backtest: outputs/backtest_results.json
  calibration: outputs/advanced_calibration.json
