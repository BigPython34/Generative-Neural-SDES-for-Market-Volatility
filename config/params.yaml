data:
  # Files & sources (used by utils/loader/data_loader.py + several workflows)
  source: data/market/volatility/vix_15m.csv

  vix_files:
    5: data/market/volatility/vix_5m.csv
    10: data/market/volatility/vix_10m.csv
    15: data/market/volatility/vix_15m.csv
    30: data/market/volatility/vix_30m.csv

  rv_source: data/market/equity_indices/spx_5m.csv

  spx_files:
    5: data/market/equity_indices/spx_5m.csv
    15: data/market/equity_indices/spx_15m.csv
    30: data/market/equity_indices/spx_30m.csv
    daily: data/market/equity_indices/spx_daily.csv
    
  cac40_files:
    5: data/market/equity_indices/cac40_5m.csv
    15: data/market/equity_indices/cac40_15m.csv
    30: data/market/equity_indices/cac40_30m.csv

  spx_daily: 

  vvix_source: data/market/volatility/vvix_daily.csv
  sofr_source: data/rates/sofr_daily_nyfed.csv
  options_cache_dir: data/options_cache

  # Dataset construction (used by loaders)
  data_type: vix

  segment_length: 120
  stride_ratio: 0.5

  max_gap_hours: 4

  # Calendar assumptions (used for annualization)
  trading_hours_per_day: 6.5
  trading_days_per_year: 252

  # RV computation (used by RealizedVolatilityLoader)
  rv_bar_interval_min: 5

  rv_training_window_bars: 4

  daily_min_year: 2000
  daily_rv_window: 5

  rv_filter:
    min: 0.001
    max: 5.0

  # Backwards-compat / legacy
  rv_window: 78

  # VIX bridging filter (used by MarketDataLoader._segment_bridged)
  max_overnight_jump: 0.5

  # Hurst estimation defaults (used by quant/analysis/hurst_estimation.py)
  hurst_estimation:
    tsrv_frequencies: ["5s"]
    daily_window_days: 5
    daily_min_year: 1990
    min_bars_per_day:
      5s: 200
      5m: 20
      15m: 10
      30m: 6
      1h: 4
      daily: 1

  # Default asset path template for Hurst (used when asset_paths is None)
  hurst_assets:
    spx:
      base_dir: data/market/equity_indices
      pattern: spx_{freq}.csv
      frequencies: ["5s", "5m", "15m", "30m", "1h", "daily"]

  # =====================
  # Multi-Scale Training Mix
  # =====================
  # Used by training workflows when mixing multiple sampling scales
  multi_scale:
    enabled: false
    scales:
    - freq_min: 15
      segment_length: 120
      weight: 1.0
    - freq_min: 30
      segment_length: 240
      weight: 0.5
    - freq_min: 60
      segment_length: 120
      weight: 0.3
# Used by training loops (bin/training/train_multi.py, engine/generative_trainer.py)
training:
  n_epochs: 100
  batch_size: 256
  learning_rate_init: 0.001
  learning_rate_final: 1.0e-05
  decay_steps: 500
  gradient_clip: 1.0
  lambda_mean: 10.0
  warmup_steps: 50
  validation_split: 0.15
  early_stopping_patience: 50
  mean_penalty_mode: global
  mean_penalty_space: log_v
  training_mode: general
  q_measure:
    lambda_martingale: 5.0
    lambda_smile: 1.0
    lambda_mmd_regularizer: 0.1
    lambda_jump_reg: 0.1
    options_data_source: data/options_cache
# Used by model definition / training (engine/neural_sde.py, engine/generative_trainer.py)
neural_sde:
  backbone: fractional
  sig_truncation_order: 4
  mlp_width: 64
  mlp_depth: 3
  drift_scale: 0.5
  diffusion_min: 0.1
  diffusion_max: 1.6
  learn_ou_params: true
  kappa: 2.72
  theta: -3.5
  log_v_clip_min: -7.0
  log_v_clip_max: 2.0
  jumps:
    lambda_init: 10.0
    mu_j_init: 1.0
    sigma_j_init: 0.5
    prior_target: 3.0
  fractional:
    hurst_init: 0.0830
    eta_init: 1.451
    learn_hurst: true
    learn_eta: true
# Used by simulation + dataset alignment (engine/neural_sde.py, utils/loader/data_loader.py)
simulation:
  n_steps: 120
  T: 0.01832
  n_paths: 5000
  bars_per_day: 26
  bar_interval_min: 15
  coherence_test:
    enabled: true
    horizons_days:
    - 5
    - 10
    - 20
    - 30
    tolerance_mean: 0.15
    tolerance_std: 0.3
# Used by Bergomi baseline / comparisons (engine/volterra.py, experiments/*)
bergomi:
  hurst: 0.0830
  eta: 1.451
  eta_source: config
  rho: -0.995
  xi0: 0.053546
  fBm_method: volterra
# Used by pricers and exotic pricing scripts (quant/pricers/*, bin/experiments/*)
pricing:
  strike: 100.0
  barrier: 90.0
  spot: 100.0
  risk_free_rate: 0.05
  maturity: 0.01832
  n_mc_paths: 5000
  use_sofr: true
# Used by backtesting workflows (bin/backtesting/*)
backtesting:
  n_days: 30
  n_mc_paths: 10000
  rv_source: data/market/equity_indices/spx_30m.csv
  maturity_days: 30
  moneyness_range:
  - -0.15
  - 0.15
  n_strikes: 11
# Used by risk metrics / stress testing (quant/risk/*, bin/experiments/stress_test_comparison.py)
risk:
  confidence_levels:
  - 0.95
  - 0.99
  var_horizon_days: 1
  stressed_var_multiplier: 1.5
  n_mc_paths: 50000
  stress_scenarios:
    black_monday:
      spot_shock: -0.22
      vol_shock: 1.5
    lehman:
      spot_shock: -0.08
      vol_shock: 0.8
    covid:
      spot_shock: -0.12
      vol_shock: 2.0
    flash_crash:
      spot_shock: -0.09
      vol_shock: 0.5
    volmageddon:
      spot_shock: -0.04
      vol_shock: 1.0
# Used by hedging workflows (quant/hedging/*, bin/experiments/deep_hedging_backtest.py)
hedging:
  transaction_cost_bps: 2.0
  default_hedge_freq: daily
  rebalance_threshold_delta: 0.01
# Used by regime detection (quant/regimes/*)
regime:
  signals:
    vix_level:
      weight: 0.3
      thresholds:
        calm: 13
        normal: 20
        stressed: 30
    vvix:
      weight: 0.2
      thresholds:
        calm: 80
        normal: 100
        stressed: 130
    term_structure:
      weight: 0.2
    vrp:
      weight: 0.15
    vix_percentile:
      weight: 0.15
  regime_params:
    calm:
      H: 0.1
      eta: 1.5
      rho: -0.65
    normal:
      H: 0.07
      eta: 1.9
      rho: -0.7
    stressed:
      H: 0.06
      eta: 2.5
      rho: -0.8
    crisis:
      H: 0.03
      eta: 3.5
      rho: -0.9
# Used by exotic product configs (quant/pricers/*)
exotics:
  asian:
    averaging: arithmetic
  autocallable:
    coupon_rate: 0.08
    autocall_barrier: 1.0
    ki_barrier: 0.6
  cliquet:
    local_cap: 0.05
    local_floor: -0.03
    global_floor: 0.0
# Used by API server (bin/apps/api_server.py)
api:
  host: 0.0.0.0
  port: 8000
  workers: 1
# Used by output paths in multiple scripts (bin/*, engine/*)
outputs:
  dir: outputs
  model_dir: outputs/models
  plots_dir: outputs/plots
  backtest: outputs/backtest_results.json
  calibration: outputs/advanced_calibration.json
